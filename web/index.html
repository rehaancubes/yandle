<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YANDLE — Your AI Conversation Link</title>
    <meta name="description" content="Turn yourself or your business into a live AI endpoint. Share a link — anyone can talk or text your AI in real time." />
    <meta name="author" content="YANDLE" />

    <!-- Favicon: use YANDLE icon so the tab/bookmark never shows a host default (e.g. Lovable) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <meta property="og:title" content="YANDLE — Your AI Conversation Link" />
    <meta property="og:description" content="Turn yourself or your business into a live AI endpoint. Share a link — anyone can talk or text your AI in real time." />
    <meta property="og:type" content="website" />
    <!-- Share preview: set og:image to your deployed origin + /og-image.png (add a 1200x630 image to public/ if needed) -->
    <meta property="og:image" content="/favicon.svg" />
    <meta property="og:image:width" content="32" />
    <meta property="og:image:height" content="32" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="YANDLE — Your AI Conversation Link" />
    <meta name="twitter:description" content="Turn yourself or your business into a live AI endpoint." />
  </head>
